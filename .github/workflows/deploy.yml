name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: read

# Cloudflare Workers, serving static assets. See wrangler.jsonc.
#
# This runs only if the repository has CLOUDFLARE_API_TOKEN set. Cloudflare's own
# git-connected Workers Build can do the same job from the dashboard; whichever
# you use, the build command is the same, and the build is the validator, so a
# book whose quotes are not in its novel never reaches the edge.
jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - run: bun install --frozen-lockfile

      # The map plates are derived from the book data and gitignored, so they are
      # composited here rather than committed. This fetches map tiles.
      - name: Composite the map plates
        run: bun run plates

      - run: bun run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
