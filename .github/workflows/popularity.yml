name: Popularity snapshot

# Refresh each book's Wikipedia-pageview popularity number once a day and commit
# it. The push redeploys the site, so the "most popular" sort stays current
# without anyone running the tool by hand. See packages/tools/src/popularity.ts.
on:
  schedule:
    - cron: '17 4 * * *' # daily, 04:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

# Never let two refreshes race to push.
concurrency:
  group: popularity
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Push with a PAT owned by an admin so the refresh commit can land on
          # main directly. main's branch protection (required PR + required
          # status check) blocks the github-actions[bot]; an admin identity
          # bypasses it because enforce_admins is off. See issue #4.
          token: ${{ secrets.REFRESH_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - run: bun install --frozen-lockfile

      - name: Refresh the Wikipedia pageview snapshot
        run: bun run popularity

      - name: Commit if the numbers moved
        run: |
          if git diff --quiet -- apps/web/src/data/popularity.json; then
            echo 'No change; nothing to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/src/data/popularity.json
          git commit --no-verify -m 'chore(data): refresh Wikipedia popularity snapshot'
          # The refresh takes minutes, so main may have moved on. Rebase onto it
          # and retry rather than die on a non-fast-forward push.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; retrying in 5s"
            sleep 5
          done
          echo 'could not push the refreshed snapshot after 3 attempts' >&2
          exit 1

      # A scheduled job that fails silently rots. File one issue (and only one)
      # so a broken refresh is visible.
      - name: Open an issue if the refresh fails
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title='Daily popularity refresh is failing'
          open=$(gh issue list --state open --json title \
            --jq "[.[] | select(.title==\"${title}\")] | length")
          if [ "${open}" = '0' ]; then
            gh issue create --title "${title}" \
              --body "The scheduled Wikipedia popularity refresh failed. Latest run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            echo 'An open issue already tracks this; not filing another.'
          fi
